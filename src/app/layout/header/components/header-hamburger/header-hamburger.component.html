<div class="header-hamburger">
  <button
    class="header-hamburger__btn"
    (click)="toggleDrawer()"
    [attr.aria-expanded]="isOpen()"
    aria-label="Menú"
    [attr.aria-controls]="'nav-drawer'"
    aria-label="Abrir menú de navegación"
  >
    ☰
  </button>
  @if (isOpen()) {
    <div
      (click)="close()"
      class="flex header-hamburger__overlay flex flex-end"
      role="dialog"
      aria-modal="true"
      aria-label="Menú de navegación"
      id="nav-drawer"
    >
      <div
        class="header-hamburger__drawer flex flex-col align-end"
        (click)="stopPropagation($event)"
      >
        <button class="header-hamburger__close" (click)="close()" aria-label="Cerrar menú">
          ✕
        </button>
        <app-header-nav (linkClicked)="close()" [vertical]="true"></app-header-nav>
        <a routerLink="/contact" class="header-hamburger__contact w-100" (click)="close()">{{
          'NAV.CONTACT' | translate
        }}</a>
      </div>
    </div>
  }
</div>
