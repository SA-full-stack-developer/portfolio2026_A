<article class="hero-stat-counter__grid">
  @for (stat of stats(); track stat.id; let i = $index) {
    <app-stat-counter
      [icon]="stat.icon"
      [startDelay]="i * 300"
      [finalValue]="stat.value"
      [label]="stat.label"
      [showPlus]="stat.showPlus"
      [shouldStartAnimation]="statsVisible()"
    >
    </app-stat-counter>
  }
</article>
